<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo Mayorista</title>
  <link rel="icon" href="img/logoAries.jpg" type="image/jpeg">
  <link rel="stylesheet" href="css/estilos.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header>
  <button id="menu-btn" class="menu-btn" aria-label="Abrir menú">
    <span></span>
    <span></span>
    <span></span>
  </button>

  <div id="menu-panel" class="menu-panel">
    <a href="#" id="menu-catalogo">   <span class="icono">📱</span> Redes </a>
  </div>

  <div class="titulo-contenedor">
   <h1 class="titulo-animado">
     <span class="emoji"> 🚚 </span>Envíos a todo el país 
    </h1>
   <!-- <span class="emoji"> 🚚 🇦🇷 </span>Envíos a todo el país -->
    <nav>
      <input type="text" id="search" placeholder="🔍 Buscá un producto..." style="margin-left:0.1rem; padding:0.3rem; border-radius:5px; border:none;">
      <p id="no-results" style="display:none; text-align:center; color:#fff; margin-top:0.5rem;"></p>
    </nav>
  </div>

  <div id="carrito-contenedor">

    <button id="carrito-btn" aria-label="Abrir carrito">
      <i class="fas fa-shopping-cart"></i>
      <span id="carrito-count">0</span>
    </button>

    <div id="carrito-dropdown">
     <span id="salir-carrito" style="cursor:pointer; float:left; font-size:20px; font-weight:bold; margin:5px;z-index: 9999; position: relative;">❌</span>
     <h3>🛍️ Tu pedido:</h3>
     <ul id="carrito-items"></ul>
     <div id="carrito-footer">
      <p id="carrito-total">Total: $0</p>
      <button id="vaciar-carrito" class="btn-vaciar">Vaciar carrito</button>
      <button id="enviar-carrito" class="btn-enviar">Hacer pedido</button>
    </div>
    </div>

  </div>
  <img src="img/logoAries1.png" class="logo-mini" alt="Logo Aries" style="right: 10rem;">
</header>

<div id="aviso-envio-gratis" class="compra-minima">
  Compra mínima $50.000 ✨
</div>

<main>
    <div class="portfolio">
      
     
</div>

    <!-- MODALl DE PRODUCTO -->
    <div id="modal" class="modal">
      <div class="modal-content">
        <span class="close">&times;</span>

        <div class="modal-body">
          <img id="modal-img" src="" alt="Producto">
          <p id="modal-title" class="modal-title"></p>
          <p id="modal-precio" class="modal-precio"></p>
        </div>

        <div class="modal-botones">
          <button id="modal-agregar" class="btn-carrito">Agregar al carrito</button>
        </div>
      </div>
    </div>

</main>

<footer>
 <a href="contacto.html"
   style="display:inline-flex; align-items:center; gap:8px;
   font-size:1.3rem; letter-spacing:2px;
   color:#fff; text-decoration:none;
   padding:10px 16px; margin:0.3rem;
   border-radius:999px;
   background:linear-gradient(135deg,#D946EF,#EC4899);
   box-shadow:0 8px 20px rgba(0,0,0,0.2);
   transition:all 0.3s ease;">
   
  <span class="icono" style="font-size:1.3rem;">📱</span>
  Redes
</a>
  <div class="footer-credito">
    <span>Hecho con </span>
    <a href="https://api.whatsapp.com/send?phone=5492291570129&text=Hola%21%20Golosinas%20Aries%20me%20recomend%C3%B3%20tu%20servicio%20y%20me%20gustar%C3%ADa%20tener%20mi%20propia%20p%C3%A1gina%20web." target="_blank">
    Tecnoideas
    <img src="https://golosinasaries.github.io/catalogo/img/TI.png" alt="Tecnoideas" class="ti-icono">
  </a>

  </a>
  </div>

</footer>

  <!-- Botón flotante-->
<div id="whatsapp-btn">
  <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/WhatsApp_icon.png" alt="">
  <span></span>
</div>
 

<script src="js/script.js"></script>

<!-- Cartel flotante general -->
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<div id="modal-cp" class="modal-cp" style="display:none;">
  <div class="modal-cp-content">
    <h3>📍 Ingresá tu código postal:</h3>
    <input type="text" id="cp-input" placeholder="Ej: 7600" />
    <div class="modal-cp-buttons">
      <button id="cp-cancelar">Cancelar</button>
      <button id="cp-confirmar">Aceptar</button>
      <button id="retirar-miramar">📍 Retirar en Miramar</button>
    </div>
  </div>
</div>
<a href="#" class="back-to-top" title="Volver arriba">
  ↑
</a>
</body>
</html>
